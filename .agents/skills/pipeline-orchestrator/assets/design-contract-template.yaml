# design-contract.yaml — Single Source of Truth, schema v5.1
# Location: artifacts/design-contract.yaml
# Rules: contract beats markdown; changelog beats field values; earlier stage
# wins where the contract is silent. Decision log (human-readable journal)
# lives in artifacts/decision-log.md — not duplicated here.

meta:
  schema_version: "5.1"
  created_at: ""            # ISO-8601, from `date` at contract init
  updated_at: ""
  mode: ""                  # quick | standard | full
  mode_override_reason: ""  # required whenever mode != auto-selection
  interaction_mode: ""      # interactive | autonomous
  artifact_type: ""         # website | web_app | dashboard | landing_page

product:
  name: ""
  category: ""
  user_outcome: ""          # what the end user gets done, one sentence
  business_outcome: ""      # what the owner gets, one sentence
  risk_level: ""            # low | medium | high
  audience: []              # list of roles; >1 triggers multi-role review
  clarification: ""         # questions_asked | assumptions_logged | mixed
  visual_boldness: ""       # conventional | familiar_distinctive | challenger | experimental
                            # default familiar_distinctive; risk_level: high → conventional [K1.2.1]

experience:
  primary_job: ""           # the ONE main job-to-be-done
  key_screens: []           # [{id, name, purpose}] — the scaling checklist
  required_states: []       # empty | loading | error | success | permission_denied ...
  scenarios: []             # acceptance walkthroughs, Given/When/Then-lite
  localization_risk: false  # [K1.7] >1 language | CJK/RTL audience | >2000 chars content
  trigger_reason: ""        # which condition fired

content_model:
  pattern: ""               # answer-first | task-first | object-first | event-first | comparison-first
  pattern_reason: ""

visual:
  category_anchors: []
  calibration:
    references: []          # principles decomposed from refs, never 1:1 conditioning
    anti_references: []
    style_card_result: ""   # e.g. "liked: 2,5,9; rejected: 3,8"
    status: ""              # done | skipped_autonomous
  directions:
    - id: ""                # A | B | C
      seed:
        persona: ""
        domains: []         # >=3, no overlap with other directions
        boldness_point: ""  # spread across the band [K2.4.1]: safer | middle | bolder
      axes:                 # the 7 axes; terse but specific
        composition: ""
        type_voice: ""
        color: ""
        surface: ""
        shape: ""
        imagery: ""
        motion: ""
      bold_moves: []        # 1–2 deliberate MAYA moves
      differs_by: {}        # {B: [axis,...], C: [...]} — >=3 per pair, incl. composition or type_voice
      concept: ""           # one paragraph, blind-description testable
      blind_test: ""        # standard/full: external AI adjective overlap <=50%, model_judged
  gate2_randomization: {}   # {"Variant 1": "B", ...} — blind order mapping
  gate2_result: ""          # chosen(A) | merged(A.base+B.color) | regenerated | provisional_ai(A)
  merge:                    # CR-06: filled when gate2_result is merged(...)
    axes_resolution: {}     # axis -> source direction id
    coherence_check: ""     # pass | fail (diagnosis, model_judged)
    confirm_render: ""      # shown | adjusted | rejected | deferred (autonomous)
  post_scale:               # CR-07: full-product failure handling
    failure_budget: 1
    used: 0
    hypothesis_log: []      # [{at, hypothesis, action}]
  final_direction: {}       # merged/resolved 7 axes — the build target
  distinctive_assets: []

gates:
  gate1: ""                 # pending | passed | changes_requested | autonomous_passed
  gate2: ""                 # pending | passed | provisional_ai | regenerated

assets:
  slots: []                 # {id, screen, kind, role, alt, file, size_kb, source,
                            #  candidates: [{file, prompt}], picked: "", disclosure: false}
  planned: []
  all_local: false          # true only when every slot resolves to a local file

acceptance:
  target_viewports: [390, 768, 1440]    # all modes [S.5]
  scenarios: []
  functional_paths:         # D21 — declared before the K3 run
    primary: ""
    alternative: ""
    error_recovery: ""
    keyboard_path: ""
  automated_checks: {}      # {D1: {status, executor}, ...} filled by quality-guardian

status:
  skeleton_approved: false
  direction_confirmed: false
  scaled: false
  qa_cycles_completed: 0
  verdict: ""               # ready | ready_with_caveats | not_ready

changelog: []               # machine journal: [{at, author: user|agent, field, from, to, reason}]
