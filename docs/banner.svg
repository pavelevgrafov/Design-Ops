<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5B6470"/>
    </marker>
    <marker id="arr-opt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3A414B"/>
    </marker>
  </defs>

  <!-- canvas -->
  <rect width="1280" height="360" fill="#121417"/>
  <rect x="0.5" y="0.5" width="1279" height="359" fill="none" stroke="#262B33"/>

  <!-- header -->
  <text x="64" y="58" font-size="21" font-weight="650" letter-spacing="5" fill="#E8EAED">DESIGN PRODUCTION PIPELINE</text>
  <text x="64" y="84" font-size="14" letter-spacing="1.5" fill="#8B939E">working foundation for sites &amp; apps · one mandatory human gate · one contract — v6.0</text>

  <!-- ===== K0 ===== -->
  <rect x="64" y="126" width="132" height="96" rx="10" fill="#1A1D23" stroke="#2E333B"/>
  <text x="88" y="152" font-size="11" letter-spacing="3" fill="#7C8590">K0</text>
  <text x="88" y="180" font-size="19" font-weight="650" fill="#E8EAED">Discovery</text>
  <text x="88" y="204" font-size="11.5" fill="#8B939E">request → profile</text>

  <!-- arrow K0 -> K1 -->
  <line x1="196" y1="174" x2="222" y2="174" stroke="#5B6470" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== K1 ===== -->
  <rect x="226" y="126" width="186" height="96" rx="10" fill="#1A1D23" stroke="#2E333B"/>
  <text x="250" y="152" font-size="11" letter-spacing="3" fill="#7C8590">K1 · CONVEYOR</text>
  <text x="250" y="180" font-size="22" font-weight="650" fill="#E8EAED">Structure</text>
  <text x="250" y="204" font-size="12" fill="#8B939E">UX — neutral skeleton</text>

  <!-- arrow K1 -> G1 -->
  <line x1="412" y1="174" x2="440" y2="174" stroke="#5B6470" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- GATE 1 (mandatory human) -->
  <g transform="translate(504,174)">
    <rect x="-42" y="-42" width="84" height="84" rx="8" transform="rotate(45)" fill="#1F232B" stroke="#E8A33D" stroke-width="1.6"/>
    <text y="-12" text-anchor="middle" font-size="12.5" font-weight="650" letter-spacing="2" fill="#E8A33D">GATE 1</text>
    <text y="6" text-anchor="middle" font-size="11" fill="#C7CCD3">human</text>
    <text y="20" text-anchor="middle" font-size="9.5" fill="#8B939E">mandatory</text>
  </g>

  <!-- arrow G1 -> K2A -->
  <line x1="564" y1="174" x2="590" y2="174" stroke="#5B6470" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== K2A ===== -->
  <rect x="594" y="126" width="186" height="96" rx="10" fill="#1A1D23" stroke="#2E333B"/>
  <text x="618" y="152" font-size="11" letter-spacing="3" fill="#7C8590">K2A · AUTOMATIC</text>
  <text x="618" y="180" font-size="22" font-weight="650" fill="#E8EAED">Base skin</text>
  <text x="618" y="204" font-size="12" fill="#8B939E">UI — calibrated default</text>

  <!-- arrow K2A -> K3 -->
  <line x1="780" y1="174" x2="806" y2="174" stroke="#5B6470" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== K3 ===== -->
  <rect x="810" y="126" width="168" height="96" rx="10" fill="#1A1D23" stroke="#2E333B"/>
  <text x="834" y="152" font-size="11" letter-spacing="3" fill="#7C8590">K3 · CONVEYOR</text>
  <text x="834" y="180" font-size="22" font-weight="650" fill="#E8EAED">Verify</text>
  <text x="834" y="204" font-size="12" fill="#8B939E">floor D1–D24</text>

  <!-- arrow K3 -> result -->
  <line x1="978" y1="174" x2="1002" y2="174" stroke="#5B6470" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== RESULT ===== -->
  <rect x="1006" y="126" width="210" height="96" rx="10" fill="#16201B" stroke="#3D7A5C" stroke-width="1.4"/>
  <text x="1030" y="152" font-size="10" letter-spacing="2" fill="#5FA37E">RESULT</text>
  <text x="1030" y="180" font-size="16.5" font-weight="650" fill="#E8EAED">Working foundation</text>
  <text x="1030" y="204" font-size="11.5" fill="#8B939E">testable locally</text>

  <!-- ===== optional routes (dashed) ===== -->
  <line x1="687" y1="222" x2="687" y2="248" stroke="#3A414B" stroke-width="1.3" stroke-dasharray="4 4" marker-end="url(#arr-opt)"/>
  <line x1="894" y1="222" x2="894" y2="248" stroke="#3A414B" stroke-width="1.3" stroke-dasharray="4 4" marker-end="url(#arr-opt)"/>

  <text x="64" y="279" font-size="11" letter-spacing="3" fill="#69727D">OPTIONS · DEFERRABLE — NEVER BLOCK THE FOUNDATION</text>

  <rect x="594" y="252" width="186" height="44" rx="8" fill="#16181D" stroke="#3A414B" stroke-dasharray="5 4"/>
  <text x="618" y="272" font-size="13" font-weight="600" fill="#C7CCD3">K2B · visual craft</text>
  <text x="618" y="288" font-size="10.5" fill="#69727D">optional · Gate 2 · anytime</text>

  <rect x="810" y="252" width="168" height="44" rx="8" fill="#16181D" stroke="#3A414B" stroke-dasharray="5 4"/>
  <text x="834" y="272" font-size="13" font-weight="600" fill="#C7CCD3">K4 · deploy</text>
  <text x="834" y="288" font-size="10.5" fill="#69727D">optional · Gate 3</text>

  <!-- footer -->
  <text x="64" y="338" font-size="12" fill="#69727D">human owns the ceiling · machine proves the floor · AI assists only where reliable</text>
  <text x="1216" y="338" text-anchor="end" font-size="12" letter-spacing="2" fill="#69727D">MIT · DESIGN-OPS v6.0</text>
</svg>
