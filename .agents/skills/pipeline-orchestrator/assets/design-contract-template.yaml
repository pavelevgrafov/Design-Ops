# design-contract.yaml — Single Source of Truth, schema v6.0
# Location: artifacts/design-contract.yaml
# Rules: contract beats markdown; changelog beats field values; earlier stage
# wins where the contract is silent. Decision log: artifacts/decision-log.md.
# v6.0: artifact profiles (site|app), starters, integrations (pack bus),
# deploy, knowledge vault, cost, gate modes. Sections new in 6.0 are nullable
# and default-empty; contracts 5.1 migrate via scripts/contract-migrate.py.

meta:
  schema_version: "6.0"
  created_at: ""            # ISO-8601, from `date` at contract init
  updated_at: ""
  mode: ""                  # quick | standard | full
  mode_override_reason: ""  # required whenever mode != auto-selection
  interaction_mode: ""      # interactive | autonomous
  artifact_type: ""         # website | web_app | dashboard | landing_page
  artifact_profile: ""      # site | app — drives conveyor defaults (v6)

product:
  name: ""
  category: ""
  user_outcome: ""
  business_outcome: ""
  risk_level: ""            # low | medium | high
  audience: []
  clarification: ""         # questions_asked | assumptions_logged | mixed
  visual_boldness: ""       # conventional | familiar_distinctive | challenger | experimental

experience:
  primary_job: ""
  key_screens: []           # [{id, name, purpose}] — site scaling checklist
  required_states: []
  scenarios: []
  localization_risk: false
  trigger_reason: ""

content_model:
  pattern: ""               # answer-first | task-first | object-first | event-first | comparison-first
  pattern_reason: ""

# --- app profile (v6; empty for site) --------------------------------------
domain_model: {}            # entities, fields, relations, enum statuses — BEFORE screens
roles_permissions: {}       # RBAC matrix: role x action x object
user_flows: []              # looped flows; screens hang off flows
screen_modules: []          # key_screens grouped by module with priorities
state_matrix: []            # screen x state x role x data-volume
api_contract: {}            # {spec: path(OpenAPI/JSON Schema), mock: dir}

# --- starters (v6) -----------------------------------------------------------
starters:
  route: ""                 # starter_first | from_scratch
  chosen: ""                # starter id
  skin_diverged: false

visual:
  category_anchors: []
  base_skin: ""             # base-site | base-app — applied at K2A (v6)
  calibration:
    references: []
    anti_references: []
    style_card_result: ""
    status: ""              # done | skipped_autonomous | deferred (K2B deferred)
  directions: []
  gate2_randomization: {}
  gate2_result: ""          # chosen(A) | merged(...) | regenerated | provisional_ai(X)
  merge:
    axes_resolution: {}
    coherence_check: ""
    confirm_render: ""
  post_scale:
    failure_budget: 1
    used: 0
    hypothesis_log: []
  final_direction: {}
  distinctive_assets: []

gates:
  mode: ""                  # separate | batched (batched only on explicit "fast")
  gate1: ""                 # pending | passed | changes_requested | autonomous_passed
  gate2: ""                 # pending | passed | provisional_ai | regenerated | deferred
  gate2_deferred: false     # K2B not requested yet (v6)
  gate3: ""                 # pending | passed — exists only with deploy pack
  delegated: []             # gates delegated to machine (provisional_ai)

# --- pack bus (v6) -----------------------------------------------------------
integrations: []            # {pack, version, class: core|peripheral, status,
                            #  env_present, acceptance: pass|fail|unavailable, cost_tier}

deploy:
  previews: []              # {url, at, floor_passed}
  prod:
    confirmed_by: ""
    at: ""
    rollback_tested: false  # dry-run rollback passed (Gate 3 acceptance)

knowledge:
  vault_path: "knowledge/"
  index_kb: 0

cost:
  estimate: ""              # shown before start: mode, ~time, ~tokens
  actual: ""                # filled after the run

assets:
  slots: []
  planned: []
  all_local: false

acceptance:
  target_viewports: [390, 768, 1440]
  scenarios: []
  functional_paths:
    primary: ""
    alternative: ""
    error_recovery: ""
    keyboard_path: ""
  functional_paths_matrix: []   # app: [{flow, role, path, permission_denied}] (v6)
  automated_checks: {}

status:
  skeleton_approved: false
  base_skin_applied: false      # K2A done (v6)
  direction_confirmed: false
  scaled: false
  qa_cycles_completed: 0
  verdict: ""               # ready | ready_with_caveats | not_ready

changelog: []               # [{at, author: user|agent, field, from, to, reason}]
