<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5B6470"/>
    </marker>
  </defs>

  <!-- canvas -->
  <rect width="1280" height="360" fill="#121417"/>
  <rect x="0.5" y="0.5" width="1279" height="359" fill="none" stroke="#262B33"/>

  <!-- header -->
  <text x="64" y="66" font-size="21" font-weight="650" letter-spacing="5" fill="#E8EAED">DESIGN PRODUCTION PIPELINE</text>
  <text x="64" y="94" font-size="14" letter-spacing="1.5" fill="#8B939E">three conveyors · two human gates · one contract — v5.1</text>

  <!-- ===== K1 ===== -->
  <rect x="64" y="150" width="280" height="100" rx="10" fill="#1A1D23" stroke="#2E333B"/>
  <text x="88" y="182" font-size="12" letter-spacing="3" fill="#7C8590">K1 · CONVEYOR</text>
  <text x="88" y="210" font-size="24" font-weight="650" fill="#E8EAED">Structure</text>
  <text x="88" y="234" font-size="13" fill="#8B939E">UX — neutral skeleton, real copy</text>

  <!-- arrow K1 -> G1 -->
  <line x1="344" y1="200" x2="394" y2="200" stroke="#5B6470" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- GATE 1 -->
  <g transform="translate(458,200)">
    <rect x="-42" y="-42" width="84" height="84" rx="8" transform="rotate(45)" fill="#1F232B" stroke="#E8A33D" stroke-width="1.6"/>
    <text y="-8" text-anchor="middle" font-size="13" font-weight="650" letter-spacing="2" fill="#E8A33D">GATE 1</text>
    <text y="10" text-anchor="middle" font-size="11" fill="#C7CCD3">human</text>
    <text y="24" text-anchor="middle" font-size="10" fill="#8B939E">structure ok</text>
  </g>

  <!-- arrow G1 -> K2 -->
  <line x1="522" y1="200" x2="572" y2="200" stroke="#5B6470" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== K2 ===== -->
  <rect x="572" y="150" width="280" height="100" rx="10" fill="#1A1D23" stroke="#2E333B"/>
  <text x="596" y="182" font-size="12" letter-spacing="3" fill="#7C8590">K2 · CONVEYOR</text>
  <text x="596" y="210" font-size="24" font-weight="650" fill="#E8EAED">Visual</text>
  <text x="596" y="234" font-size="13" fill="#8B939E">UI — directions → tokens → assets</text>

  <!-- arrow K2 -> G2 -->
  <line x1="852" y1="200" x2="902" y2="200" stroke="#5B6470" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- GATE 2 -->
  <g transform="translate(966,200)">
    <rect x="-42" y="-42" width="84" height="84" rx="8" transform="rotate(45)" fill="#1F232B" stroke="#E8A33D" stroke-width="1.6"/>
    <text y="-8" text-anchor="middle" font-size="13" font-weight="650" letter-spacing="2" fill="#E8A33D">GATE 2</text>
    <text y="10" text-anchor="middle" font-size="11" fill="#C7CCD3">human</text>
    <text y="24" text-anchor="middle" font-size="10" fill="#8B939E">blind choice</text>
  </g>

  <!-- arrow G2 -> K3 -->
  <line x1="1030" y1="200" x2="1056" y2="200" stroke="#5B6470" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ===== K3 ===== -->
  <rect x="1056" y="150" width="160" height="100" rx="10" fill="#1A1D23" stroke="#2E333B"/>
  <text x="1072" y="182" font-size="12" letter-spacing="2" fill="#7C8590">K3 · CONVEYOR</text>
  <text x="1072" y="208" font-size="19" font-weight="650" fill="#E8EAED">Verify</text>
  <text x="1072" y="232" font-size="11" fill="#8B939E">floor D1–D21</text>

  <!-- footer annotations -->
  <text x="64" y="300" font-size="12" fill="#69727D">human decides taste at the gates · machine proves the floor · AI assists only where reliable</text>
  <text x="1216" y="300" text-anchor="end" font-size="12" letter-spacing="2" fill="#69727D">MIT · DESIGN-OPS</text>
</svg>
