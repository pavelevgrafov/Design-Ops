meta: {schema_version: "6.0", mode: standard, artifact_profile: app}
product: {name: "Starter: app-dashboard", category: back-office, risk_level: medium}
experience:
  primary_job: "When a manager opens the dashboard, I want today's queue and its exceptions in one glance."
  key_screens: [{id: dashboard, name: "Operations dashboard", purpose: "monitor queue, act on exceptions"}]
  required_states: [loading, empty, error, success, permission_denied]
content_model: {pattern: task-first, pattern_reason: "the user came to work the queue"}
starters: {route: starter_first, chosen: app-dashboard}
domain_model:
  order: {fields: [id, customer, status(new|in_progress|done|cancelled), total, created_at]}
roles_permissions:
  admin:   [order.create, order.update, order.delete, reports.view]
  manager: [order.create, order.update, reports.view]
user_flows: [{id: work-queue, steps: [open dashboard, filter orders, open order, update status]}]
state_matrix: [{screen: dashboard, states: [loading, empty, error, success, permission_denied], volumes: [0, 100]}]
api_contract: {spec: mock/orders.openapi.json, mock: mock/}
gates: {gate1: passed, gate2: deferred, gate2_deferred: true}
status: {base_skin_applied: true, verdict: ready_with_caveats}
visual: {}
acceptance: {}